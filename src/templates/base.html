<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MyFruitShop</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/ws.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css" rel="stylesheet"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>

    <style>
        * { box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
            height: 100vh; /* Жестко фиксируем высоту экрана */
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Запрещаем прокрутку всей страницы */
        }
        .top-bar {
            background: #ffe6cc;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #000;
            flex-shrink: 0; /* Шапка никогда не сжимается */
        }
        .main-content {
            display: flex;
            gap: 10px;
            padding: 10px;
            flex: 1;
            min-height: 0; /* Критично для работы внутреннего скролла */
            overflow: hidden;
        }
        .layout-left {
            flex: 3;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 0; /* Критично */
        }
        /* Верхняя левая панель (Продукты) */
        .layout-left > .panel:first-child {
            flex: 1.8; /* Увеличили пропорцию */
            overflow-y: auto;
        }
        .layout-bottom {
            display: flex;
            gap: 10px;
            flex: 1; /* Занимает оставшееся место */
            min-height: 0;
        }
        .layout-right {
            flex: 1;
            background: #fff;
            border: 1px solid #000;
            padding: 15px;
            overflow-y: auto; /* Прокрутка для логов */
            min-width: 300px;
        }
        .panel {
            background: #fff;
            border: 1px solid #000;
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow-y: auto; /* Прокрутка внутри панелей */
        }

        /* Стили таблиц */
        table { width: 100%; border-collapse: collapse; text-align: center; }
        th, td { border: 1px solid #ccc; padding: 4px 8px; } /* Уменьшили высоту строк */
        th { background: #f9f9f9; font-weight: normal; position: sticky; top: 0; z-index: 10; }

        /* Стили инпутов и кнопок */
        .action-input { width: 60px; padding: 4px; border: 1px solid #ccc; text-align: center; margin-right: 5px; }
        .btn { border: 1px solid #000; padding: 5px 15px; cursor: pointer; border-radius: 12px; }
        .btn:hover { opacity: 0.9; }
        .btn-buy { background: #cce6cc; }
        .btn-sell { background: #ffe6cc; }
        .btn-login { background: #ffaa80; }

        /* Логи */
        .log-error { color: red; margin-bottom: 5px; font-size: 13px; }
        .log-success { color: green; margin-bottom: 5px; font-size: 13px; }

        .highlight-update { animation: flash 1.5s ease-out; }
        @keyframes flash {
            0% { background-color: #ffeb3b; }
            100% { background-color: transparent; }
        }
    </style>
</head>
<body>
    {% include 'includes/header.html' %}

    <div id="trade-trash" style="display: none;"></div>

    <div class="main-content" hx-ext="ws" ws-connect="/ws/trades/" hx-target="#trade-trash">
        {% block content %}{% endblock %}
    </div>

    <script>
        // =====================================
        // 1. Логика WebSockets (Торговля и Склад)
        // =====================================
        const wsScheme = window.location.protocol === "https:" ? "wss" : "ws";
        const tradeSocket = new WebSocket(wsScheme + '://' + window.location.host + '/ws/trades/');

        tradeSocket.onclose = function(e) {
            console.error('Trade socket closed unexpectedly');
        };

        // --- ДОБАВИТЬ ЭТОТ БЛОК ---
        tradeSocket.onmessage = function(e) {
            try {
                // Пытаемся прочитать как JSON. Если это HTML от HTMX, выпадет ошибка и мы её проигнорируем.
                const data = JSON.parse(e.data);

                // --- ЛОГИКА АУДИТА ---
                if (data.event_type === 'audit_progress') {
                    const bar = document.getElementById('audit-progress-bar');
                    const text = document.getElementById('audit-progress-text');
                    if (bar && text) {
                        bar.style.width = data.progress + '%';
                        text.innerText = data.progress + '%';
                    }
                } else if (data.event_type === 'audit_complete') {
                    toastr.success("Аудит успешно завершен!");
                    const btn = document.getElementById('audit-btn');
                    if (btn) {
                        btn.disabled = false;
                        btn.style.opacity = '1';
                        btn.style.cursor = 'pointer';
                    }
                    // Сбрасываем бар через 2 секунды
                    setTimeout(() => {
                        const bar = document.getElementById('audit-progress-bar');
                        const text = document.getElementById('audit-progress-text');
                        if (bar && text) {
                            bar.style.width = '0%';
                            text.innerText = '0%';
                        }
                    }, 2000);
                } else if (data.event_type === 'audit_failed') {
                    toastr.error("Ошибка при выполнении аудита!");
                    document.getElementById('audit-btn').disabled = false;
                    document.getElementById('audit-btn').style.opacity = '1';

                // --- ЛОГИКА МАТЕМАТИЧЕСКОЙ ПРОВЕРКИ ---
                } else if (data.event_type === 'check_start') {
                    toastr.info("Математическая проверка начата...");
                } else if (data.event_type === 'check_complete') {
                    toastr.success("Проверка завершена! Итераций: " + data.result);
                    const btn = document.getElementById('check-btn');
                    if (btn) {
                        btn.disabled = false;
                        btn.style.opacity = '1';
                        btn.style.cursor = 'pointer';
                    }
                } else if (data.event_type === 'check_failed') {
                    toastr.error("Ошибка при проверке склада!");
                    const btn = document.getElementById('check-btn');
                    if (btn) {
                        btn.disabled = false;
                        btn.style.opacity = '1';
                        btn.style.cursor = 'pointer';
                    }
                }
            } catch (err) {
                // Если парсинг JSON не удался, значит прилетел кусок HTML от HTMX.
                // Ничего не делаем, HTMX сам вставит его куда нужно.
            }
        };

        // =====================================
        // 2. Настройка уведомлений (Toastr)
        // =====================================
        toastr.options = {
            "closeButton": true,
            "positionClass": "toast-bottom-right",
            "timeOut": "3000",
        };

        // =====================================
        // 3. Функции запуска тасок
        // =====================================

        // Запуск старого Аудита (с прогресс-баром)
        function startAudit() {
            const csrfInput = document.querySelector('[name=csrfmiddlewaretoken]');
            if (!csrfInput) {
                toastr.error("Пожалуйста, войдите в систему.", "Ошибка");
                return;
            }

            fetch('/api/audit/', {
                method: 'POST',
                headers: { 'X-CSRFToken': csrfInput.value }
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'error') {
                    toastr.error(data.message, "Отклонено");
                } else {
                    toastr.info(data.message, "Запуск");
                    const btn = document.getElementById('audit-btn');
                    if (btn) {
                        btn.disabled = true;
                        btn.style.opacity = '0.5';
                        btn.style.cursor = 'not-allowed';
                    }
                }
            })
            .catch(err => toastr.error("Ошибка соединения с сервером"));
        }

        // Запуск новой математической Проверки склада (без sleep)
        function startWarehouseCheck() {
            const csrfInput = document.querySelector('[name=csrfmiddlewaretoken]');
            if (!csrfInput) {
                toastr.error("Пожалуйста, войдите в систему.", "Ошибка");
                return;
            }

            fetch('/api/check-warehouse/', {
                method: 'POST',
                headers: { 'X-CSRFToken': csrfInput.value }
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'error') {
                    toastr.error(data.message, "Отклонено");
                } else {
                    toastr.info(data.message, "Запуск");
                    const btn = document.getElementById('check-btn');
                    if (btn) {
                        btn.disabled = true;
                        btn.style.opacity = '0.5';
                        btn.style.cursor = 'not-allowed';
                    }
                }
            })
            .catch(err => toastr.error("Ошибка соединения с сервером"));
        }

        // =====================================
        // 4. Поллинг статуса задач (каждые 10 сек)
        // =====================================
        function updateTasksStatus() {
            fetch('/api/tasks/')
                .then(res => {
                    if (!res.ok) throw new Error("Ошибка авторизации или сервера");
                    return res.json();
                })
                .then(data => {
                    const container = document.getElementById('tasks-status-list');
                    if (!container) return;

                    if (data.tasks && data.tasks.length > 0) {
                        let html = '<table style="width:100%; text-align:left; font-size: 12px; border:none;">';
                        data.tasks.forEach(t => {
                            let color = '#666';
                            if (t.status === 'running') color = '#d97706';
                            if (t.status === 'completed') color = '#16a34a';
                            if (t.status === 'failed') color = '#dc2626';

                            html += `
                                <tr style="border-bottom: 1px solid #eee;">
                                    <td style="padding: 4px 0;">${t.task_name}</td>
                                    <td style="padding: 4px 0; font-weight: bold; color: ${color};">${t.status}</td>
                                    <td style="padding: 4px 0; text-align: right;">${t.last_run_at}</td>
                                </tr>`;
                        });
                        html += '</table>';
                        container.innerHTML = html;
                    } else {
                        container.innerHTML = "Нет зарегистрированных задач.";
                    }
                })
                .catch(err => console.error("Ошибка обновления задач:", err));
        }

        if (document.getElementById('tasks-status-list')) {
            updateTasksStatus();
            setInterval(updateTasksStatus, 10000);
        }

        // =====================================
        // 5. Автопрокрутка чата (HTMX)
        // =====================================
        document.body.addEventListener('htmx:wsAfterMessage', function(e) {
            // Если в пришедшем сообщении есть упоминание чата
            if (e.detail.message.includes('chat-messages')) {
                const chatBox = document.getElementById('chat-messages');
                if (chatBox) {
                    chatBox.scrollTop = chatBox.scrollHeight;
                }
            }
        });
    </script>
</body>
</html>
