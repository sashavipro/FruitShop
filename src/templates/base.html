<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MyFruitShop</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css" rel="stylesheet"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>

    <style>
        * { box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
            height: 100vh; /* Жестко фиксируем высоту экрана */
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Запрещаем прокрутку всей страницы */
        }
        .top-bar {
            background: #ffe6cc;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #000;
            flex-shrink: 0; /* Шапка никогда не сжимается */
        }
        .main-content {
            display: flex;
            gap: 10px;
            padding: 10px;
            flex: 1;
            min-height: 0; /* Критично для работы внутреннего скролла */
            overflow: hidden;
        }
        .layout-left {
            flex: 3;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 0; /* Критично */
        }
        /* Верхняя левая панель (Продукты) */
        .layout-left > .panel:first-child {
            flex: 1.8; /* Увеличили пропорцию */
            overflow-y: auto;
        }
        .layout-bottom {
            display: flex;
            gap: 10px;
            flex: 1; /* Занимает оставшееся место */
            min-height: 0;
        }
        .layout-right {
            flex: 1;
            background: #fff;
            border: 1px solid #000;
            padding: 15px;
            overflow-y: auto; /* Прокрутка для логов */
            min-width: 300px;
        }
        .panel {
            background: #fff;
            border: 1px solid #000;
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow-y: auto; /* Прокрутка внутри панелей */
        }

        /* Стили таблиц */
        table { width: 100%; border-collapse: collapse; text-align: center; }
        th, td { border: 1px solid #ccc; padding: 4px 8px; } /* Уменьшили высоту строк */
        th { background: #f9f9f9; font-weight: normal; position: sticky; top: 0; z-index: 10; }

        /* Стили инпутов и кнопок */
        .action-input { width: 60px; padding: 4px; border: 1px solid #ccc; text-align: center; margin-right: 5px; }
        .btn { border: 1px solid #000; padding: 5px 15px; cursor: pointer; border-radius: 12px; }
        .btn:hover { opacity: 0.9; }
        .btn-buy { background: #cce6cc; }
        .btn-sell { background: #ffe6cc; }
        .btn-login { background: #ffaa80; }

        /* Логи */
        .log-error { color: red; margin-bottom: 5px; font-size: 13px; }
        .log-success { color: green; margin-bottom: 5px; font-size: 13px; }

        .highlight-update { animation: flash 1.5s ease-out; }
        @keyframes flash {
            0% { background-color: #ffeb3b; }
            100% { background-color: transparent; }
        }
    </style>
</head>
<body>
    {% include 'includes/header.html' %}
    <div class="main-content">
        {% block content %}{% endblock %}
    </div>

    <script>
        // =====================================
        // 1. Логика WebSockets (Торговля)
        // =====================================
        const wsScheme = window.location.protocol === "https:" ? "wss" : "ws";
        const tradeSocket = new WebSocket(wsScheme + '://' + window.location.host + '/ws/trades/');

        tradeSocket.onmessage = function(e) {
            const data = JSON.parse(e.data);

            if (data.type === 'trade_update') {

                // --- НОВАЯ ЛОГИКА АУДИТА ИЗ WS ---
                if (data.event_type === 'audit_progress') {
                    const bar = document.getElementById('audit-progress-bar');
                    const txt = document.getElementById('audit-progress-text');
                    if (bar) bar.style.width = data.progress + '%';
                    if (txt) txt.innerText = data.progress + '%';
                }
                else if (data.event_type === 'audit_complete') {
                    const bar = document.getElementById('audit-progress-bar');
                    const txt = document.getElementById('audit-progress-text');
                    const btn = document.getElementById('audit-btn');

                    if (bar) bar.style.width = '100%';
                    if (txt) txt.innerText = '100%';
                    toastr.success("Бухгалтерский аудит успешно завершен!", "Готово");

                    // Сбрасываем бар через 2 секунды
                    setTimeout(() => {
                        if (btn) { btn.disabled = false; btn.style.opacity = '1'; btn.style.cursor = 'pointer'; }
                        if (bar) bar.style.width = '0%';
                        if (txt) txt.innerText = '0%';
                    }, 2000);
                }
                else if (data.event_type === 'audit_failed') {
                    const btn = document.getElementById('audit-btn');
                    toastr.error("Сбой при выполнении аудита.", "Ошибка");
                    if (btn) { btn.disabled = false; btn.style.opacity = '1'; btn.style.cursor = 'pointer'; }
                }
                // --- СТАРАЯ ЛОГИКА ТОРГОВЛИ (если event_type не указан) ---
                else if (data.log) {
                    // Обновляем баланс
                    const balanceEl = document.getElementById('bank-balance');
                    if (balanceEl) {
                        balanceEl.innerText = parseFloat(data.balance).toFixed(2) + ' USD';
                    }

                    // Добавляем лог
                    const logsContainer = document.getElementById('trade-logs');
                    if (logsContainer) {
                        const logDiv = document.createElement('div');
                        logDiv.className = data.log.status === 'SUCCESS' ? 'log-success' : 'log-error';
                        logDiv.innerText = `${data.log.created_at} - ${data.log.status}: ${data.log.message}`;
                        logsContainer.insertBefore(logDiv, logsContainer.firstChild);
                    }

                    // Обновляем строку товара
                    if (data.log.status === 'SUCCESS' && data.product) {
                        const qtyEl = document.getElementById('qty-' + data.product.name);
                        const opEl = document.getElementById('op-' + data.product.name);
                        const rowEl = document.getElementById('row-' + data.product.name);

                        if (qtyEl && opEl && rowEl) {
                            qtyEl.innerText = data.product.quantity;
                            opEl.innerText = data.product.last_operation;

                            rowEl.classList.remove('highlight-update');
                            void rowEl.offsetWidth;
                            rowEl.classList.add('highlight-update');
                        }
                    }
                }
            }
        };

        tradeSocket.onclose = function(e) {
            console.error('Trade socket closed unexpectedly');
        };

        // =====================================
        // 2. Логика Бухгалтерского аудита (Toastr)
        // =====================================
        toastr.options = {
            "closeButton": true,
            "positionClass": "toast-bottom-right",
            "timeOut": "3000",
        };

        function startAudit() {
            // Ищем CSRF-токен на странице
            const csrfInput = document.querySelector('[name=csrfmiddlewaretoken]');
            if (!csrfInput) {
                toastr.error("Пожалуйста, войдите в систему.", "Ошибка");
                return;
            }
            const csrfToken = csrfInput.value;

            fetch('/api/audit/', {
                method: 'POST',
                headers: { 'X-CSRFToken': csrfToken }
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'error') {
                    toastr.error(data.message, "Отклонено");
                } else {
                    toastr.info(data.message, "Запуск");
                    // Просто блокируем кнопку, остальное сделает WebSocket
                    const btn = document.getElementById('audit-btn');
                    if (btn) {
                        btn.disabled = true;
                        btn.style.opacity = '0.5';
                        btn.style.cursor = 'not-allowed';
                    }
                }
            })
            .catch(err => toastr.error("Ошибка соединения с сервером"));
        }

        // =====================================
        // 3. Поллинг статуса задач (каждые 10 сек)
        // =====================================
        function updateTasksStatus() {
            fetch('/api/tasks/')
                .then(res => {
                    if (!res.ok) throw new Error("Ошибка авторизации или сервера");
                    return res.json();
                })
                .then(data => {
                    const container = document.getElementById('tasks-status-list');
                    if (!container) return;

                    if (data.tasks && data.tasks.length > 0) {
                        let html = '<table style="width:100%; text-align:left; font-size: 12px; border:none;">';
                        data.tasks.forEach(t => {
                            // Выбираем цвет в зависимости от статуса
                            let color = '#666';
                            if (t.status === 'running') color = '#d97706'; // Оранжевый
                            if (t.status === 'completed') color = '#16a34a'; // Зеленый
                            if (t.status === 'failed') color = '#dc2626'; // Красный

                            html += `
                                <tr style="border-bottom: 1px solid #eee;">
                                    <td style="padding: 4px 0;">${t.task_name}</td>
                                    <td style="padding: 4px 0; font-weight: bold; color: ${color};">${t.status}</td>
                                    <td style="padding: 4px 0; text-align: right;">${t.last_run_at}</td>
                                </tr>`;
                        });
                        html += '</table>';
                        container.innerHTML = html;
                    } else {
                        container.innerHTML = "Нет зарегистрированных задач.";
                    }
                })
                .catch(err => console.error("Ошибка обновления задач:", err));
        }

        // Запускаем поллинг, только если пользователь авторизован (видит панель)
        if (document.getElementById('tasks-status-list')) {
            updateTasksStatus(); // Делаем первый запрос сразу
            setInterval(updateTasksStatus, 10000); // Повторяем каждые 10 секунд
        }

        // =====================================
        // 4. Логика WebSockets (Чат)
        // =====================================
        const chatSocket = new WebSocket(wsScheme + '://' + window.location.host + '/ws/chat/');

        const chatMessages = document.getElementById('chat-messages');
        const chatInput = document.getElementById('chat-input');
        const chatSendBtn = document.getElementById('chat-send-btn');

        // Функция автоскролла вниз
        function scrollToBottom() {
            if (chatMessages) {
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
        }

        // Прием сообщений от сервера
        chatSocket.onmessage = function(e) {
            const data = JSON.parse(e.data);
            if (data.type === 'chat_message') {
                // Убираем заглушку "Сообщений пока нет", если она есть
                const emptyMsg = chatMessages.querySelector('p[style*="text-align: center"]');
                if (emptyMsg) emptyMsg.remove();

                // Создаем новый параграф с сообщением
                const p = document.createElement('p');
                p.style.margin = "2px 0";
                p.innerHTML = `<span style="color: #666;">${data.created_at}</span> <strong>${data.author_name}:</strong> ${data.message}`;

                chatMessages.appendChild(p);
                scrollToBottom(); // Скроллим к новому сообщению
            }
        };

        chatSocket.onclose = function(e) {
            console.error('Chat socket closed unexpectedly');
        };

        // Функция отправки сообщения
        function sendMessage() {
            if (!chatInput) return;
            const message = chatInput.value.trim();
            if (message) {
                chatSocket.send(JSON.stringify({ 'message': message }));
                chatInput.value = ''; // Очищаем поле ввода
            }
        }

        // Слушатель клика по кнопке "Отправить"
        if (chatSendBtn) {
            chatSendBtn.onclick = sendMessage;
        }

        // Слушатель нажатия Enter в поле ввода
        if (chatInput) {
            chatInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault(); // Предотвращаем перезагрузку формы (если бы она была)
                    sendMessage();
                }
            });
        }

        // При первой загрузке страницы сразу скроллим чат вниз
        scrollToBottom();
    </script>
</body>
</html>
