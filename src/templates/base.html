<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MyFruitShop</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0; /* Светло-серый фон страницы */
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .top-bar {
            background: #ffe6cc;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #000;
        }
        .main-content {
            display: flex;
            gap: 10px;
            padding: 10px;
            flex: 1;
            min-height: 0; /* Чтобы скролл работал корректно */
        }
        .layout-left {
            flex: 3;
            display: flex;
            flex-direction: column;
            gap: 10px; /* Отступ между таблицей и нижним блоком */
        }
        .layout-right {
            flex: 1;
            background: #fff;
            border: 1px solid #000;
            padding: 5px;
            overflow-y: scroll;
            min-width: 300px;
        }
        .layout-bottom {
            display: flex;
            gap: 10px;
        }
        .panel {
            background: #fff;
            border: 1px solid #000;
        }

        /* Стили таблиц */
        table { width: 100%; border-collapse: collapse; text-align: center; }
        th, td { border: 1px solid #ccc; padding: 8px; }
        th { background: #f9f9f9; font-weight: normal; }

        /* Стили инпутов и кнопок */
        .action-input { width: 60px; padding: 4px; border: 1px solid #ccc; text-align: center; margin-right: 5px; }
        .btn { border: 1px solid #000; padding: 5px 15px; cursor: pointer; border-radius: 12px; }
        .btn:hover { opacity: 0.9; }
        .btn-buy { background: #cce6cc; }
        .btn-sell { background: #ffe6cc; }
        .btn-login { background: #ffaa80; }

        /* Логи */
        .log-error { color: red; margin-bottom: 5px; font-size: 13px; }
        .log-success { color: green; margin-bottom: 5px; font-size: 13px; }
    </style>
</head>
<body>
    {% include 'includes/header.html' %}
    <div class="main-content">
        {% block content %}{% endblock %}
    </div>

    <script>
        // Определяем протокол
        const wsScheme = window.location.protocol === "https:" ? "wss" : "ws";
        const tradeSocket = new WebSocket(wsScheme + '://' + window.location.host + '/ws/trades/');

        tradeSocket.onmessage = function(e) {
            const data = JSON.parse(e.data);

            if (data.type === 'trade_update') {
                // 1. Обновляем баланс
                const balanceEl = document.getElementById('bank-balance');
                if (balanceEl) {
                    balanceEl.innerText = parseFloat(data.balance).toFixed(2) + ' USD';
                }

                // 2. Добавляем новый лог наверх списка
                const logsContainer = document.getElementById('trade-logs');
                if (logsContainer) {
                    const logDiv = document.createElement('div');
                    // Назначаем класс для цвета
                    logDiv.className = data.log.status === 'SUCCESS' ? 'log-success' : 'log-error';
                    logDiv.innerText = `${data.log.created_at} - ${data.log.status}: ${data.log.message}`;

                    // Вставляем лог в начало блока
                    logsContainer.insertBefore(logDiv, logsContainer.firstChild);
                }

                // Бонус: можно также обновлять строку товара в таблице (если добавить ID к строкам таблицы)
            }
        };

        tradeSocket.onclose = function(e) {
            console.error('Trade socket closed unexpectedly');
        };
    </script>
</body>
</html>
