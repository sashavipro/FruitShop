<div class="panel chat-section"
     ws-connect="/ws/chat/"
     style="flex: 1; padding: 10px; display: flex; flex-direction: column; gap: 10px; min-width: 0;">

    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ccc; padding-bottom: 5px; flex-shrink: 0;">
        <span style="font-weight: bold;">Чат сотрудников</span>

        <div style="display: flex; gap: 5px;">
            <button id="btn-wake-joker"
                    hx-post="/api/wake-joker/"
                    hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
                    hx-swap="none"
                    hx-on::after-request="
                        if(event.detail.successful) {
                            let resp = JSON.parse(event.detail.xhr.response);
                            if(resp.status === 'info') toastr.info(resp.message);
                            else toastr.success(resp.message);

                            this.style.display = 'none';
                            document.getElementById('btn-sleep-joker').style.display = 'block';
                        } else toastr.error('Ошибка активации');
                    "
                    class="btn"
                    style="background: #dcfce7; padding: 2px 10px; font-size: 12px; border-radius: 10px; cursor: pointer; border: 1px solid #22c55e;">
                🟢 Разбудить Шутника
            </button>

            <button id="btn-sleep-joker"
                    hx-post="/api/sleep-joker/"
                    hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
                    hx-swap="none"
                    hx-on::after-request="
                        if(event.detail.successful) {
                            toastr.warning('Бот ушел в спячку 😴');

                            this.style.display = 'none';
                            document.getElementById('btn-wake-joker').style.display = 'block';
                        } else toastr.error('Ошибка');
                    "
                    class="btn"
                    style="display: none; background: #fee2e2; padding: 2px 10px; font-size: 12px; border-radius: 10px; cursor: pointer; border: 1px solid #ef4444;">
                🔴 Усыпить Шутника
            </button>
        </div>
    </div>

    <div id="chat-messages" style="flex: 1; border: 1px solid #000; overflow-y: auto; padding: 5px; font-size: 13px; display: flex; flex-direction: column; min-height: 0;">
        {% for msg in chat_messages %}
            <p style="margin: 2px 0;">
                <span style="color: #666;">{{ msg.created_at|date:"H:i" }}</span>
                <strong>{{ msg.author_name }}:</strong>
                {{ msg.text }}
            </p>
        {% empty %}
            <p style="color: #999; text-align: center; margin-top: auto; margin-bottom: auto;">
                Сообщений пока нет. Напишите что-нибудь!
            </p>
        {% endfor %}
    </div>

    <div id="chat-trash" style="display: none;"></div>

    <form ws-send hx-target="#chat-trash"
          hx-on::ws-after-send="this.reset()"
          style="display: flex; gap: 10px; flex-shrink: 0; margin: 0;">
        <input type="text" name="message" placeholder="Текст сообщения..." required style="flex: 1; padding: 5px; border: 1px solid #ccc; border-radius: 3px;">
        <button type="submit" class="btn btn-login">Отправить</button>
    </form>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const chatBox = document.getElementById("chat-messages");
        if (chatBox) {
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        fetch('/api/joker-status/')
            .then(response => response.json())
            .then(data => {
                if (data.is_active) {
                    document.getElementById('btn-wake-joker').style.display = 'none';
                    document.getElementById('btn-sleep-joker').style.display = 'block';
                }
            })
            .catch(err => console.error("Ошибка проверки статуса Шутника:", err));
    });
</script>
