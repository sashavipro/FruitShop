<div id="trade-logs">
    {% for log in logs %}
        {% if log.status == 'SUCCESS' %}
            <div class="log-success">{{ log.created_at|date:"d.m.Y H:i" }} - SUCCESS: {{ log.message }}</div>
        {% else %}
            <div class="log-error">{{ log.created_at|date:"d.m.Y H:i" }} - ERROR: {{ log.message }}</div>
        {% endif %}
    {% empty %}
        <div style="font-size: 13px; color: #666;">Логов пока нет. Запустите Celery Beat!</div>
    {% endfor %}
</div>
