<div class="panel bank-section" style="flex: 1.5; padding: 15px; display: flex; flex-direction: column; gap: 15px; align-items: center; min-height: 0; min-width: 0; overflow-y: auto;">
    <div style="text-align: center; width: 100%; flex-shrink: 0;">
        <span>БАНК</span>
    </div>

    <table style="width: 100%; margin: 0; flex-shrink: 0;">
        <tr>
            <td style="text-align: center; border-right: 1px solid #ccc; width: 50%;">Банковский счёт:</td>
            <td style="text-align: center; font-weight: bold; color: #d97706; font-size: 18px;">
                <span id="bank-balance">{{ account.balance|default:"0.00" }} USD</span>
            </td>
        </tr>
    </table>

    <div style="display: flex; justify-content: space-between; align-items: center; width: 100%; flex-shrink: 0; flex-wrap: wrap; gap: 10px;">
        <button id="audit-btn" onclick="startAudit()" class="btn" style="background: #fbcfe8; border-radius: 15px; padding: 10px 15px; text-align: center; line-height: 1.2; border: 1px solid #000; cursor: pointer;">
            Провести<br>бухгалтерский аудит
        </button>
        <button id="check-btn" onclick="startWarehouseCheck()" class="btn" style="background: #e9d5ff; border-radius: 15px; padding: 10px 15px; text-align: center; line-height: 1.2; border: 1px solid #000; cursor: pointer;">
            Проверка<br>склада (Math)
        </button>
        <div style="flex: 1; min-width: 120px; position: relative;">
            <div style="height: 20px; border: 1px solid #ccc; border-radius: 5px; background: #e9ecef; overflow: hidden; position: relative;">
                <div id="audit-progress-bar" style="height: 100%; width: 0%; background-color: #fbcfe8; transition: width 0.5s ease-in-out;"></div>
                <span id="audit-progress-text" style="position: absolute; top: 0; left: 0; width: 100%; text-align: center; font-size: 12px; font-weight: bold; line-height: 20px; color: #000;">0%</span>
            </div>
        </div>
    </div>

    <form hx-post="/api/balance/"
          hx-swap="none"
          hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
          hx-on::after-request="
              if(event.detail.successful) {
                  let resp = JSON.parse(event.detail.xhr.response);
                  if(resp.status === 'ok') {
                      toastr.success(resp.message);
                      this.reset(); // Очищаем поле ввода
                  } else {
                      toastr.error(resp.message);
                  }
              } else {
                  toastr.error('Ошибка сети или сервера');
              }
          "
          style="display: flex; gap: 10px; width: 100%; align-items: center; flex-shrink: 0; flex-wrap: wrap; margin: 0;">

        <input type="number" name="amount" placeholder="сумма" step="0.01" min="0.01" required style="flex: 1; min-width: 80px; padding: 5px; border: 1px solid #ccc; border-radius: 3px;">
        <button type="submit" name="action" value="deposit" class="btn btn-buy">Пополнить</button>
        <button type="submit" name="action" value="withdraw" class="btn btn-sell">Вывести</button>
    </form>

    <div style="display: flex; justify-content: space-between; align-items: center; width: 100%; flex-shrink: 0; flex-wrap: wrap; gap: 10px;">

        <form hx-post="/api/upload-declaration/"
              hx-encoding="multipart/form-data"
              hx-trigger="change from:#decl-file"
              hx-swap="none"
              hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
              hx-on::after-request="
                  if(event.detail.successful) {
                      let resp = JSON.parse(event.detail.xhr.response);
                      if(resp.status === 'ok') {
                          toastr.success(resp.message);
                          // Обновляем общую цифру в счетчике
                          document.getElementById('decl-count').innerText = resp.total_count;
                      } else {
                          toastr.error(resp.message);
                      }
                  } else {
                      toastr.error('Ошибка сети или сервера при загрузке');
                  }
                  document.getElementById('decl-file').value = '';
              "
              style="margin: 0;">

            <input type="file" id="decl-file" name="file" style="display: none;" accept=".pdf,.csv,.xlsx,.xls">

            <button type="button" onclick="document.getElementById('decl-file').click();" class="btn" style="background: #bfdbfe; border-radius: 15px; padding: 6px 15px;">
                Загрузить декларации
            </button>
        </form>

        <span style="font-size: 13px;">Всего загружено: <span id="decl-count" style="font-weight: bold;">{{ total_declarations|default:"0" }}</span> шт.</span>
    </div>
</div>
