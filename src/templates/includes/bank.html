<div class="panel bank-section" style="flex: 1.5; padding: 15px; display: flex; flex-direction: column; gap: 15px; align-items: center;">
    <div style="text-align: center; width: 100%;">
        <span>БАНК</span>
    </div>

    <table style="width: 90%; margin: 0;">
        <tr>
            <td style="text-align: center; border-right: 1px solid #ccc; width: 50%;">Банковский счёт:</td>
            <td style="text-align: center; font-weight: bold; color: #d97706; font-size: 18px;">245 USD</td>
        </tr>
    </table>

    <div style="display: flex; justify-content: space-between; align-items: center; width: 90%;">
        <button class="btn" style="background: #fbcfe8; border-radius: 15px; padding: 10px 15px; text-align: center; line-height: 1.2;">Провести<br>бухгалтерский аудит</button>
        <div style="width: 150px; text-align: center;">
            <span style="font-size: 12px;">75%</span>
            <div style="position: relative; height: 6px; border: 1px solid #000; border-radius: 5px; background: #fff; margin-top: 5px;">
                <div style="position: absolute; top: 0; left: 0; height: 100%; width: 75%; background: #fbcfe8; border-radius: 5px;"></div>
                <div style="position: absolute; top: -5px; left: 75%; width: 14px; height: 14px; background: #fff; border: 1px solid #000; border-radius: 50%; transform: translateX(-50%);"></div>
            </div>
        </div>
    </div>

    <div style="display: flex; gap: 10px; width: 90%; align-items: center;">
        <input type="text" placeholder="сумма" style="width: 100px; padding: 5px; border: 1px solid #ccc; border-radius: 3px;">
        <button class="btn btn-buy">Пополнить</button>
        <button class="btn btn-sell">Вывести</button>
    </div>

    <div style="display: flex; justify-content: space-between; align-items: center; width: 90%;">
        <button class="btn" style="background: #bfdbfe; border-radius: 15px; padding: 6px 15px;">Загрузить декларации</button>
        <span style="font-size: 13px;">Сегодня загружено: 2 шт.</span>
    </div>
</div>
